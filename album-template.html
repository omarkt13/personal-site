<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>[album name] — omar kutbi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <header>
      <nav>
        <a href="index.html">about</a>
        <a href="writing.html">writing</a>
        <a href="photography.html" class="current">photography</a>
      </nav>
    </header>

    <p><a href="photography.html">&larr; all albums</a></p>

    <h2>[album name]</h2>
    <p class="note">month year</p>

    <!--
      Duplicate this file per album (e.g. ski-touring.html, riyadh.html) and
      point the link in photography.html at it.

      Images are served through img.omarkutbi.com (a Cloudflare Worker that
      proxies Cloudinary and only responds to requests coming from this
      site — see cloudinary-gate-worker.js). Each img src below should be:

        https://img.omarkutbi.com/<folder>/<file>.jpg

      where <folder>/<file>.jpg matches the path of the photo in your
      Cloudinary media library (folder = album name you used when
      uploading). Do NOT link directly to res.cloudinary.com/... — that
      bypasses the access gate.

      Note: because the Worker checks the page's Referer, these images
      won't load if you open this file locally from your computer
      (file://) — only when served from omarkutbi.com. That's expected.
    -->
    <div class="photo-grid">
      <div class="photo-box"><img src="https://img.omarkutbi.com/[folder]/[photo1].jpg" alt="[caption]"></div>
      <div class="photo-box"><img src="https://img.omarkutbi.com/[folder]/[photo2].jpg" alt="[caption]"></div>
      <div class="photo-box"><img src="https://img.omarkutbi.com/[folder]/[photo3].jpg" alt="[caption]"></div>
      <div class="photo-box"><img src="https://img.omarkutbi.com/[folder]/[photo4].jpg" alt="[caption]"></div>
    </div>

  </div>
</body>
</html>
