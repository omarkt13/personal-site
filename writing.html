<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>writing — omar kutbi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <header>
      <nav>
        <a href="index.html">about</a>
        <a href="writing.html" class="current">writing</a>
        <a href="photography.html">photography</a>
      </nav>
    </header>

    <p class="note">pulled automatically from <a href="https://omarkutbi.substack.com">omarkutbi.substack.com</a>.</p>

    <div id="writing-feed">
      <p class="note">loading posts&hellip;</p>
    </div>

    <script>
      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      async function loadPosts() {
        const container = document.getElementById('writing-feed');
        try {
          const res = await fetch('writing.json', { cache: 'no-store' });
          const data = await res.json();

          if (!data.posts || !data.posts.length) {
            throw new Error('empty feed');
          }

          const items = data.posts.map(function (post) {
            return '<li><a href="' + post.link + '" target="_blank" rel="noopener">' +
              escapeHtml(post.title) + '</a><span class="date">' + post.date_label + '</span></li>';
          }).join('');

          container.innerHTML = '<ul class="writing-list">' + items + '</ul>';
        } catch (err) {
          container.innerHTML = '<p class="note">couldn\'t load posts automatically &mdash; ' +
            '<a href="https://omarkutbi.substack.com">read them on substack</a>.</p>';
        }
      }

      loadPosts();
    </script>

  </div>
</body>
</html>
