name: Sync photo albums

# Runs daily at 14:00 UTC (~3pm Central European Time in winter/CET;
# ~4pm during EU daylight saving/CEST, since GitHub Actions cron always
# runs on UTC and doesn't shift for DST). Can also be triggered manually
# from the Actions tab.
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-albums
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run album sync
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python3 sync_albums.py

      - name: Commit and push changes if anything changed
        run: |
          git config user.name "album-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-sync photo albums from Cloudinary"
            git push
          fi
